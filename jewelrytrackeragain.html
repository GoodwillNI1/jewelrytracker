<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jewelry Tracker</title>
    <style>
        body { font-family: sans-serif; background: #eef2f3; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 20px; }
        label { display: block; margin-top: 15px; font-weight: 600; color: #444; }
        select, input { width: 100%; padding: 12px; margin-top: 8px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin-top: 20px; border-radius: 8px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .submit-btn { background: #3498db; color: white; }
        .submit-btn:hover { background: #2980b9; }
        .export-btn { background: #27ae60; color: white; margin-top: 10px; }
        .clear-btn { background: #e74c3c; color: white; font-size: 12px; padding: 5px; margin-top: 30px; opacity: 0.7; }
        .history { margin-top: 25px; border-top: 2px solid #eee; padding-top: 15px; }
        .log-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #fafafa; font-size: 14px; }
    </style>
</head>
<body>

<div class="card">
    <h2>💎 Production Log</h2>
    
    <label>Employee Name</label>
    <select id="employee">
        <option>Nicole</option>
        <option>Tracy</option>
        <option>Adorian</option>
        <option>Lisa</option>
        <option>Carmella</option>
    </select>

    <label>Pounds Processed (lbs)</label>
    <input type="number" id="weight" step="0.1" placeholder="e.g. 12.5">

    <button class="submit-btn" onclick="saveEntry()">Submit Entry</button>

    <div class="history">
        <h3>Recent Entries</h3>
        <div id="logList"></div>
        <button class="export-btn" onclick="downloadCSV()">Download Excel (CSV)</button>
        <button class="clear-btn" onclick="clearAll()">Clear All Data</button>
    </div>
</div>

<script>
    // Load and display data immediately when page opens
    window.onload = function() {
        updateDisplay();
    };

    function saveEntry() {
        const name = document.getElementById('employee').value;
        const weight = document.getElementById('weight').value;
        const timestamp = new Date().toLocaleString();

        if (!weight || weight <= 0) {
            alert("Please enter a valid weight amount.");
            return;
        }

        const newEntry = { name, weight, timestamp };
        
        // Get existing data from browser memory
        let data = JSON.parse(localStorage.getItem('jewelryData')) || [];
        data.push(newEntry);
        
        // Save back to browser memory
        localStorage.setItem('jewelryData', JSON.stringify(data));

        // Reset input and refresh list
        document.getElementById('weight').value = '';
        updateDisplay();
        alert("Saved successfully!");
    }

    function updateDisplay() {
        const data = JSON.parse(localStorage.getItem('jewelryData')) || [];
        const logList = document.getElementById('logList');
        
        // Show last 5 entries on screen
        logList.innerHTML = data.slice(-5).reverse().map(item => `
            <div class="log-item">
                <span><strong>${item.name}</strong></span>
                <span>${item.weight} lbs</span>
                <span style="color:gray">${item.timestamp.split(',')[0]}</span>
            </div>
        `).join('');
    }

    function downloadCSV() {
        const data = JSON.parse(localStorage.getItem('jewelryData')) || [];
        if (data.length === 0) return alert("No data to download yet!");

        let csvContent = "Date,Employee,Weight(lbs)\n";
        data.forEach(item => {
            csvContent += `${item.timestamp},${item.name},${item.weight}\n`;
        });

        const blob = new Blob([csvContent], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'jewelry_report.csv';
        a.click();
    }

    function clearAll() {
        if (confirm("Are you sure you want to delete ALL historical data? This cannot be undone.")) {
            localStorage.removeItem('jewelryData');
            updateDisplay();
        }
    }
</script>

</body>
</html>
